name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp target/release/yggcli dist/yggcli-linux-amd64
          sha256sum dist/yggcli-linux-amd64 > dist/yggcli-linux-amd64.sha256

      - name: Generate curated release notes
        run: ./scripts/release-notes.sh "${{ github.ref_name }}" > dist/RELEASE_NOTES.md

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yggcli-linux-amd64
            dist/yggcli-linux-amd64.sha256
          body_path: dist/RELEASE_NOTES.md
